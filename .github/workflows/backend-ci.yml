name: Backend CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
        exclude:
          # Exclude Python 3.9 on Ubuntu 22.04 (EOL)
          - python-version: "3.9"
            runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          pytest --cov=src --cov-report=xml --cov-report=term-missing --cov-fail-under=70
        env:
          PYTHONPATH: ${{ github.workspace }}/src

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

      - name: Generate coverage report
        run: |
          coverage html --directory=htmlcov
          coverage report --show-missing

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: |
            coverage.xml
            htmlcov/
          retention-days: 30

      - name: Test performance check
        run: |
          echo "Running performance check..."
          time pytest --tb=short -q
          echo "Performance check complete"

  # Fast test run for PR validation
  fast-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run fast tests (exclude slow)
        run: |
          pytest -m "not slow" --cov=src --cov-report=term-missing --cov-fail-under=70
        env:
          PYTHONPATH: ${{ github.workspace }}/src

      - name: Coverage threshold check
        run: |
          coverage report --fail-under=70
        env:
          PYTHONPATH: ${{ github.workspace }}/src

  # Quality gates
  quality-check:
    runs-on: ubuntu-latest
    needs: [backend, fast-tests]
    if: always()
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.backend.result }}" == "failure" ] || [ "${{ needs.fast-tests.result }}" == "failure" ]; then
            echo "❌ Tests failed - quality gate not met"
            exit 1
          else
            echo "✅ All tests passed - quality gate met"
          fi
