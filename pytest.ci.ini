[tool:pytest]
# CI-optimized pytest configuration
minversion = "8.0"
addopts = 
    -ra 
    --strict-markers 
    --strict-config
    --tb=short
    --durations=10
    --durations-min=0.1
    --cov=src
    --cov-report=xml
    --cov-report=term-missing
    --cov-fail-under=70
    --cov-branch
    --cov-config=.coveragerc
    -n auto
    --dist=loadfile

testpaths = [
    "tests"
]

markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "unit: marks tests as unit tests (pure functions)",
    "domain: marks tests as domain integration tests",
    "api: marks tests as API endpoint tests",
    "property: marks tests as property-based tests",
    "integration: marks tests as end-to-end integration tests",
]

# Parallel execution settings
n = auto
dist = loadfile
tx = 4

# Coverage settings
cov = src
cov_report = xml,term-missing
cov_fail_under = 70
cov_branch = true

# Test discovery and execution
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

# Performance optimizations
durations = 10
durations_min = 0.1
tb = short

# CI-specific settings
addopts = 
    --strict-markers
    --strict-config
    --tb=short
    --durations=10
    --durations-min=0.1
    --cov=src
    --cov-report=xml
    --cov-report=term-missing
    --cov-fail-under=70
    --cov-branch
    -n auto
    --dist=loadfile

# Environment variables
env = 
    PYTHONPATH = src
    TESTING = true
    COVERAGE = true
    PYTEST_ADDOPTS = --strict-markers --strict-config
